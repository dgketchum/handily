# New Mexico batch REM configuration

project_name = "nm"
bucket_prefix = "handily"
local_data_root = "/data/ssd2/handily"
ee_project = "ee-dgketchum"
et_bucket = "wudr"

# Input data
fields_path = "/nas/openET/OpenET_GeoDatabase/NM.shp"
flowlines_local_dir = "/nas/boundaries/wbd/NHD_H_New_Mexico_State_Shape/Shape"
ndwi_dir = "/data/ssd2/handily/nm/ndwi/"
stac_dir = "/nas/handily/stac/3dep_1m/"

# Output directory (used for single-AOI runs; batch REM uses --out-root)
