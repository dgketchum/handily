# FAC REM reusable profile - static CONUS 10m build (Phase-2 pilot)
#
# Used by per-HUC8 configs that build_conus_fac_rem.py generates. No per-AOI
# imagery: the soft wet seed comes from NHD perenniality class
# (seed_from_nhd_class = true), hard support from rasterized NHD open water.
# Montane-leaning head-solve (below_bed_offset_m = 0), 10 m burn resolution.
#
# This file intentionally excludes [paths]; the per-HUC8 config supplies
# dem_path, streams_path, fac_path, support_path, out_dir.

[strips]
coarse_res_m = 20.0
smooth_sigma_m = 500.0
station_spacing_m = 50.0
tangent_step_m = 10.0
min_hit_dist_m = 5.0
min_strahler = 0
max_crossing_strip_m = 800.0
# naked_fill_m is intentionally left unset (= 0): CONUS keeps live "edge" strips
# rather than the Mesilla/Ruby bounded-flat-anchor fallback, because the montane
# pilot regimes have real cross-valley structure to reach. Edge mode means the
# boundary probe runs to the full AOI diagonal, but that is a single, cheap ring
# intersection; the cost reduction comes from the capped stream ray, the STRtree
# predicate query, balanced worker chunks, and the array-based sparse burn -- not
# from shortening the boundary probe. (Revisit if a deep-arid CONUS expansion
# wants the bounded fallback, as in nm_*/mt_mh_* configs.)
halo_n = 12
workers = 8
# Strip layer is a burn intermediate, not a product; the builder also passes
# --no-strip-debug, but pin it here so a direct profile run is consistent.
write_strip_debug = false

[raster]
burn_res_m = 10.0
idw_radius_m = 1000.0
idw_power = 2.0
post_smooth_m = 100.0
base_fac_snap_cells = 2

[seed]
ndvi_mid = 0.20
ndvi_scale = 0.06
ndvi_quantile = 0.9
support_override = 1.0
seed_from_nhd_class = true

[propagation]
distance_scale_m = 4000.0
elevation_scale_m = 25.0
strahler_distance_scale = 0.5

[sag]
gamma = 2.0
rmax_min_m = 2.0
rmax_max_m = 60.0
alpha_d = 0.75
alpha_z = 1.0
area_sag_lo_km2 = 50.0
area_sag_hi_km2 = 500.0

[solver]
d_min_off_support_m = 0.5
support_fraction_threshold = 0.25
below_bed_offset_m = 0.0
target_weight_base = 2.0
zero_weight_base = 2.0
smoothness_weight = 1.0
neighbor_length_floor_m = 200.0
max_hydraulic_slope = 0.05
max_iter = 500
tol = 0.01
